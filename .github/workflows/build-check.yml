name: Swift Build Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Compile Swift (iOS 15+)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve Package
        run: swift package resolve

      - name: Build (compile check only)
        run: |
          swift build -c debug --sdk $(xcrun --sdk iphonesimulator --show-sdk-path) --triple arm64-apple-ios15.0-simulator
