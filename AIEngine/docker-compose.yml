services:
  velora-ai-engine:
    build: .
    container_name: velora-ai-engine
    restart: unless-stopped
    tty: true
    # Use host networking so the container can directly access localhost:11434 (Ollama)
    network_mode: "host"
    volumes:
      # Save the sqlite-vec database in the unified data folder
      - /home/tony/Velora_AI/db:/app/data
      # Save Obsidian memories in the unified data folder
      - /home/tony/Velora_AI/Memories:/app/Memories
      # Mount your existing Navidrome music folder (Read-Only)
      - /home/tony/navidrome/music:/music:ro
    environment:
      # Connect directly to localhost since we are on the host network
      - OLLAMA_BASE_URL=http://localhost:11434/api
      # Use the user's specific locally downloaded model
      - VELORA_MODEL=gemma4:e4b

    # GPU Passthrough configuration for PyTorch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
