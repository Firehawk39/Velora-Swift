services:
  velora-ai-engine:
    build: .
    container_name: velora-ai-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Save the sqlite-vec database in the unified data folder
      - /home/tony/Velora_AI/db:/app/data
      # Save Obsidian memories in the unified data folder
      - /home/tony/Velora_AI/Memories:/app/Memories
      # Mount your existing Navidrome music folder (Read-Only)
      - /home/tony/navidrome/music:/music:ro
    environment:
      # Connect to the native Ollama installation running on your Ubuntu Host
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/api
    # This is required for host.docker.internal to work natively on Ubuntu Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # GPU Passthrough configuration for PyTorch
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
