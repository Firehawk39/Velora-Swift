workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project Velora.xcodeproj \
            --scheme Velora \
            --configuration Debug

    artifacts:
      - build/ios/*.ipa

    artifacts:
      - build/ios/*.ipa