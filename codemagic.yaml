workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Build Unsigned App
        script: |
          xcodebuild archive \
            -scheme Velora \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            TARGETED_DEVICE_FAMILY="1,2" \
            INSTALL_PATH=/Applications \
            PRODUCT_NAME=Velora \
            WRAPPER_EXTENSION=app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO

      - name: Build IPA
        script: |
          # 1. Find the app bundle
          APP_PATH=$(find Velora.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL: Failed to find .app bundle."
            find Velora.xcarchive
            exit 1
          fi
          
          # 2. Find the binary
          BINARY_NAME="Velora"
          BINARY_PATH=$(find Velora.xcarchive/Products -type f -name "$BINARY_NAME" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find Velora.xcarchive/Products -type f -perm +111 -not -name "*.plist" -not -name "*.otf" | head -n 1)
          fi
          
          if [ -z "$BINARY_PATH" ]; then
            echo "CRITICAL: Failed to find binary."
            exit 1
          fi
          
          # 3. Assemble the bundle manually to be 100% sure
          echo "Assembling bundle from $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Update internal variable to point to the copy we are patching
          PAYLOAD_APP="Payload/$(basename "$APP_PATH")"
          
          if [ ! -f "$PAYLOAD_APP/$BINARY_NAME" ]; then
             echo "Binary $BINARY_NAME not found in bundle, trying to find it in archive..."
             cp "$BINARY_PATH" "$PAYLOAD_APP/$BINARY_NAME"
          fi
          chmod +x "$PAYLOAD_APP/$BINARY_NAME"
          
          # 4. Force-write the Info.plist to ensure TrollStore compatibility and native iPad resolution
          cat <<EOF > "$PAYLOAD_APP/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$BINARY_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.velora.aistudio</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Velora</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <true/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
                  <key>NSAllowsLocalNetworking</key>
                  <true/>
              </dict>
              <key>CADisableMinimumFrameDuration</key>
              <true/>
              <key>CADisableMinimumFrameDurationOnPhone</key>
              <true/>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon</string>
                      </array>
                      <key>CFBundleIconName</key>
                      <string>AppIcon</string>
                  </dict>
              </dict>
              <key>CFBundleIcons~ipad</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon</string>
                      </array>
                      <key>CFBundleIconName</key>
                      <string>AppIcon</string>
                  </dict>
              </dict>
              <key>NSLocalNetworkUsageDescription</key>
              <string>Velora needs to connect to your Navidrome server on your local network.</string>
              <key>NSBonjourServices</key>
              <array>
                  <string>_http._tcp</string>
                  <string>_subsonic._tcp</string>
              </array>
          </dict>
          </plist>
          EOF
          
          echo "Verifying Assets.car existence..."
          if [ -f "$PAYLOAD_APP/Assets.car" ]; then
             echo "SUCCESS: Assets.car found."
          else
             echo "WARNING: Assets.car NOT FOUND in bundle root. Checking subdirectories..."
             find "$PAYLOAD_APP" -name "Assets.car"
             # If found elsewhere, copy to root
             CAR_PATH=$(find "$PAYLOAD_APP" -name "Assets.car" | head -n 1)
             if [ ! -z "$CAR_PATH" ] && [ "$CAR_PATH" != "$PAYLOAD_APP/Assets.car" ]; then
                echo "Copying Assets.car from $CAR_PATH to bundle root..."
                cp "$CAR_PATH" "$PAYLOAD_APP/Assets.car"
             fi
          fi
          
          echo "Final bundle contents for $(basename "$APP_PATH"):"
          ls -F "$PAYLOAD_APP"
          
          echo "Verifying Info.plist keys:"
          grep -E "UIDeviceFamily|UIRequiresFullScreen|UILaunchScreen" "$PAYLOAD_APP/Info.plist"
          
          # 5. Create IPA
          zip -r Velora-Jailbreak.ipa Payload
          
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
