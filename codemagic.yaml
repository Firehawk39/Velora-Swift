workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Diagnostic Info
        script: |
          xcodebuild -version
          xcodebuild -list
          xcodebuild -scheme Velora -showBuildSettings -configuration Release -destination "generic/platform=iOS"
      - name: Build Unsigned App
        script: |
          xcodebuild archive \
            -scheme Velora \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            INSTALL_PATH=/Applications \
            PRODUCT_NAME=Velora \
            WRAPPER_EXTENSION=app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO

      - name: Build IPA
        script: |
          # The app should be in the archive
          APP_PATH=$(find Velora.xcarchive -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL: Failed to find .app bundle in archive."
            find Velora.xcarchive
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          echo "App bundle size:"
          du -sh "$APP_PATH"
          
          echo "App bundle contents:"
          ls -R "$APP_PATH"
          
          # Create the Payload structure for the IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Zip it up into an .ipa
          zip -r Velora-Jailbreak.ipa Payload
          
          echo "Generated IPA size:"
          ls -lh Velora-Jailbreak.ipa
          
          # Move to artifacts
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
