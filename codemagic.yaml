workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build
        script: |
          swift package resolve
          swift package generate-xcodeproj --package-path . --scheme Velora
          xcode-project build-ipa --project Velora.xcodeproj --scheme Velora --configuration Debug

    artifacts:
      - build/ios/*.ipa

    artifacts:
      - build/ios/*.ipa