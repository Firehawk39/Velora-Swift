workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: "16"
    scripts:
      - name: Build
        script: |
          set -e
          xcode-select --print-path
          swift package resolve --package-path .
          swift package generate-xcodeproj --package-path . --scheme Velora
          xcodebuild -project Velora.xcodeproj \
            -scheme Velora \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath build/Velora.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=YES

      - name: Package IPA
        script: |
          mkdir -p Payload
          find build/Velora.xcarchive -name "*.app" -type d -exec cp -R {} Payload/Velora.app \;
          zip -r build/Velora-Jailbreak.ipa Payload
          mkdir -p build/ios
          mv build/Velora-Jailbreak.ipa build/ios/

    artifacts:
      - build/ios/*.ipa