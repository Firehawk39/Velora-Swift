workflows:
  ios-jailbreak:
    name: Velora SPM Jailbreak IPA
    instance_type: mac_mini_m1
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: latest
      flutter: stable
    scripts:
      - name: Check build tools
        script: |
          xcodebuild -version || true
          swift --version || true

      - name: Generate Xcode project from SPM
        script: |
          swift package generate-xcodeproj --scheme Velora
          ls -la *.xcodeproj

      - name: Build iOS app with xcodebuild
        script: |
          set -e
          xcodebuild archive \
            -project Velora.xcodeproj \
            -scheme Velora \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            SKIP_INSTALL=YES

      - name: Package IPA
        script: |
          set -e
          APP=$(find Velora.xcarchive -name "*.app" -type d | head -1)
          echo "App bundle: $APP"
          
          mkdir -p Payload
          cp -R "$APP" Payload/Velora.app

      - name: Create final IPA
        script: |
          cat > Payload/Velora.app/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>Velora</string>
    <key>CFBundleIdentifier</key>
    <string>com.velora.aistudio</string>
    <key>CFBundleName</key>
    <string>Velora</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
    <key>MinimumOSVersion</key>
    <string>15.0</string>
</dict>
</plist>
EOF
          
          zip -r Velora-Jailbreak.ipa Payload
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa