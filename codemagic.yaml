workflows:
  ios-release:
    name: Velora iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: "com.velora.aistudio"
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Set up code signing
        script: |
          # Fetch profiles from Codemagic settings
          xcode-project use-profiles
      - name: Build and Archive (Manual)
        script: |
          # Swift Playgrounds (.swiftpm) projects are built via the root Package.swift
          # We avoid using the -project flag which caused the previous failure.
          xcodebuild archive \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -archivePath "build/ios/Velora.xcarchive" \
            -allowProvisioningUpdates \
            -quiet
      - name: Export IPA
        script: |
          # Create a basic ExportOptions.plist
          # Note: 'method' can be 'development', 'ad-hoc', or 'app-store'
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/ios/Velora.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "build/ios/ipa"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
