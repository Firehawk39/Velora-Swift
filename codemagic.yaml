workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: "16"
    scripts:
      - name: Resolve Swift packages
        script: |
          swift package resolve

      - name: Generate Xcode project
        script: |
          swift package generate-xcodeproj --scheme Velora

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project Velora.xcodeproj \
            --scheme Velora \
            --configuration Debug

    artifacts:
      - build/ios/*.ipa