workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.velora.aistudio"
        APP_NAME: "Velora"
    scripts:
      - name: Resolve Swift packages
        script: |
          swift package resolve

      - name: Build iOS app
        script: |
          # Build as a Mach-O executable for iOS
          xcodebuild archive \
            -scheme Velora \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO

      - name: Package IPA
        script: |
          set -e
          # Find the binary. For SPM executables, it's usually in Products/usr/local/bin
          # But xcodebuild archive might put it elsewhere.
          BINARY_PATH=$(find Velora.xcarchive -name "Velora" -type f | head -1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Could not find Velora binary in archive"
            find Velora.xcarchive
            exit 1
          fi
          echo "Found binary at $BINARY_PATH"

          # Create the App Bundle structure
          mkdir -p Payload/Velora.app
          cp "$BINARY_PATH" Payload/Velora.app/Velora
          chmod +x Payload/Velora.app/Velora

          # Create Info.plist
          cat <<EOF > Payload/Velora.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Velora</string>
              <key>CFBundleIdentifier</key>
              <string>$BUNDLE_ID</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <true/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
          </dict>
          </plist>
          EOF

          # Copy Resources if they exist (assets, fonts)
          # We need to find where the compiled resources are. 
          # For SPM, they are often in a .bundle inside the build folder.
          RESOURCE_BUNDLE=$(find derived_data -name "*.bundle" -type d | head -1)
          if [ -d "$RESOURCE_BUNDLE" ]; then
            echo "Copying resources from $RESOURCE_BUNDLE"
            cp -R "$RESOURCE_BUNDLE/"* Payload/Velora.app/
          fi

          # Create the IPA
          zip -r Velora-Jailbreak.ipa Payload
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
