workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Diagnostic Info
        script: |
          xcodebuild -version
          xcodebuild -list
          xcodebuild -scheme Velora -showBuildSettings -configuration Release -destination "generic/platform=iOS"
      - name: Build Unsigned App
        script: |
          xcodebuild build \
            -scheme Velora \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Build IPA
        script: |
          # Get the build directory from xcodebuild
          BUILD_DIR=$(xcodebuild -scheme Velora -configuration Release -destination "generic/platform=iOS" -derivedDataPath build -showBuildSettings | grep CONFIGURATION_BUILD_DIR | cut -d'=' -f2 | xargs)
          
          echo "Build directory according to xcodebuild: $BUILD_DIR"
          
          # Try to find the app in that directory first
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -maxdepth 1 | head -n 1)
          
          # Fallback: search everywhere in derivedData
          if [ -z "$APP_PATH" ]; then
            echo "App not found in $BUILD_DIR, searching entire derivedData..."
            APP_PATH=$(find build -name "*.app" | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL: Failed to find .app bundle anywhere in build directory."
            echo "Directory structure of build folder:"
            find build -maxdepth 4
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create the Payload structure for the IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Zip it up into an .ipa
          zip -r Velora-Jailbreak.ipa Payload
          
          # Move to artifacts
          mkdir -p build/ios/ipa
          mv Velora-Jailbreak.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
