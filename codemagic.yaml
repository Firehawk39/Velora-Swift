workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: "16"
    scripts:
      - name: Set up and build
        script: |
          TOOLCHAIN=/Applications/Xcode-16.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain
          export PATH="$TOOLCHAIN/usr/bin:$PATH"
          swift package resolve
          swift package generate-xcodeproj --scheme Velora
          xcode-project build-ipa \
            --project Velora.xcodeproj \
            --scheme Velora \
            --configuration Debug

    artifacts:
      - build/ios/*.ipa