workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.velora.aistudio"
        APP_NAME: "Velora"
    scripts:
      - name: Resolve Swift packages
        script: |
          swift package resolve

      - name: Build iOS app
        script: |
          # Build as a Mach-O executable for iOS
          # We use xcodebuild directly on the SPM package
          xcodebuild build \
            -scheme Velora \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        script: |
          set -e
          # Find the binary
          BINARY_PATH=$(find derived_data -name "Velora" -type f -perm +111 | head -1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Could not find Velora binary"
            find derived_data -name "Velora"
            exit 1
          fi
          echo "Found binary at $BINARY_PATH"

          # Create the App Bundle structure
          mkdir -p Payload/Velora.app
          cp "$BINARY_PATH" Payload/Velora.app/Velora
          chmod +x Payload/Velora.app/Velora

          # Create Info.plist
          cat <<EOF > Payload/Velora.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Velora</string>
              <key>CFBundleIdentifier</key>
              <string>$BUNDLE_ID</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <true/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
          </dict>
          </plist>
          EOF

          # Find and copy resources
          # When SPM builds resources, it creates a bundle like "Velora_AppModule.bundle"
          find derived_data -name "*.bundle" -type d -exec cp -R {} Payload/Velora.app/ \;
          
          # Also copy compiled assets
          find derived_data -name "Assets.car" -exec cp {} Payload/Velora.app/ \;

          # Create the IPA
          zip -r Velora-Jailbreak.ipa Payload
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
