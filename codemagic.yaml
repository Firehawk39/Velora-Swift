workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.velora.aistudio"
        APP_NAME: "Velora"
    scripts:
      - name: Resolve Swift packages
        script: |
          swift package resolve

      - name: Build iOS app
        script: |
          # Build using xcodebuild build (reliable for SPM executables)
          xcodebuild build \
            -scheme Velora \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENTITLEMENTS_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        script: |
          set -e
          
          # 1. Find the binary
          BINARY_PATH=$(find derived_data -name "Velora" -type f -perm +111 | head -1)
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Could not find Velora binary"
            exit 1
          fi
          echo "Found binary at $BINARY_PATH"

          # 2. Setup the App Bundle
          mkdir -p Payload/Velora.app
          cp "$BINARY_PATH" Payload/Velora.app/Velora
          chmod +x Payload/Velora.app/Velora

          # 3. Create the Info.plist
          # We use a robust template and then inject custom keys
          cat <<EOF > Payload/Velora.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Velora</string>
              <key>CFBundleIdentifier</key>
              <string>$BUNDLE_ID</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <true/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
          </dict>
          </plist>
          EOF

          # 4. Compile Assets (App Icon) natively for 1.2MB size
          echo "Compiling App Icons..."
          mkdir -p build
          xcrun actool Sources/App/Resources/Assets.xcassets \
            --compile Payload/Velora.app \
            --platform iphoneos \
            --minimum-deployment-target 17.0 \
            --app-icon AppIcon \
            --output-partial-info-plist build/partial.plist || true
          
          if [ -f "build/partial.plist" ]; then
             /usr/libexec/PlistBuddy -x -c "Merge build/partial.plist" Payload/Velora.app/Info.plist || true
          fi

          # 5. Inject Background and Privacy keys (FIXED PlistBuddy indexing)
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:2 string processing" Payload/Velora.app/Info.plist || true

          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers array" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers:0 string com.velora.library.audit" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers:1 string com.velora.library.metadata" Payload/Velora.app/Info.plist || true

          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" Payload/Velora.app/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'Velora needs to connect to your Navidrome server.'" Payload/Velora.app/Info.plist || true

          # 6. Copy Resource Bundles (Core Data)
          # ONLY copy from Products directory to avoid empty intermediate overwrites
          find derived_data/Build/Products -name "*.bundle" -type d -exec cp -R {} Payload/Velora.app/ \;

          # 7. Create the IPA
          zip -r Velora-Jailbreak.ipa Payload
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
