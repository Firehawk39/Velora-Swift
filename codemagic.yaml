workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Build Unsigned App
        script: |
          # Build for actual iOS hardware (iphoneos) but skip signing
          xcodebuild build \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package IPA (Jailbreak Style)
        script: |
          # Find the built .app bundle
          # The path is usually in the DerivedData folder.
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Velora.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find Velora.app"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create the Payload structure for the IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Zip it up into an .ipa
          zip -r Velora-Jailbreak.ipa Payload
          
          # Move to artifacts
          mkdir -p build/ios/ipa
          mv Velora-Jailbreak.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
