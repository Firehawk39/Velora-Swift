workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Diagnostic Info
        script: |
          xcodebuild -version
          xcodebuild -list
          xcodebuild -scheme Velora -showBuildSettings -configuration Release -destination "generic/platform=iOS"
      - name: Build Unsigned App
        script: |
          xcodebuild archive \
            -scheme Velora \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            INSTALL_PATH=/Applications \
            PRODUCT_NAME=Velora \
            WRAPPER_EXTENSION=app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO

      - name: Build IPA
        script: |
          # 1. Find the app bundle
          APP_PATH=$(find Velora.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL: Failed to find .app bundle."
            find Velora.xcarchive
            exit 1
          fi
          
          # 2. Find the binary (it's often in usr/local/bin/ for Swiftpm projects)
          BINARY_NAME="Velora"
          BINARY_PATH=$(find Velora.xcarchive/Products -type f -name "$BINARY_NAME" | head -n 1)
          
          # Fallback: find any Mach-O binary if named differently
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find Velora.xcarchive/Products -type f -perm +111 -not -name "*.plist" -not -name "*.otf" | head -n 1)
          fi
          
          if [ -z "$BINARY_PATH" ]; then
            echo "CRITICAL: Failed to find binary in archive."
            find Velora.xcarchive/Products
            exit 1
          fi
          
          echo "Found binary at: $BINARY_PATH"
          echo "Moving binary to: $APP_PATH/$BINARY_NAME"
          
          # 3. Move binary into the app bundle
          cp "$BINARY_PATH" "$APP_PATH/$BINARY_NAME"
          chmod +x "$APP_PATH/$BINARY_NAME"
          
          echo "App bundle size after fix:"
          du -sh "$APP_PATH"
          
          echo "App bundle contents after fix:"
          ls -R "$APP_PATH"
          
          # 4. Create the Payload structure for the IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Zip it up into an .ipa
          zip -r Velora-Jailbreak.ipa Payload
          
          echo "Generated IPA size:"
          ls -lh Velora-Jailbreak.ipa
          
          # Move to artifacts
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
