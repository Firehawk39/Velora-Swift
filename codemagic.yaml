workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app
        script: |
          xcodebuild -scheme Velora \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath build/Velora.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=YES
          mkdir -p Payload
          find build -name "*.app" -type d -exec cp -R {} Payload/Velora.app \;
          zip -r build/Velora-Jailbreak.ipa Payload
          mkdir -p build/ios
          mv build/Velora-Jailbreak.ipa build/ios/

    artifacts:
      - build/ios/*.ipa

    artifacts:
      - build/ios/*.ipa