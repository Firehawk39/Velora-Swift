workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - ~/.swiftpm
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "com.velora.aistudio"
        APP_NAME: "Velora"
    scripts:
      - name: Resolve Swift packages
        script: |
          swift package resolve

      - name: Build iOS app
        script: |
          # Build a complete iOS app using xcodebuild archive on the Swift Package
          xcodebuild archive \
            -scheme Velora \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            TARGETED_DEVICE_FAMILY="1,2" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENTITLEMENTS_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        script: |
          set -e
          
          # Find the built .app from the xcarchive
          APP_PATH=$(find Velora.xcarchive -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app in xcarchive"
            exit 1
          fi
          
          echo "Found app at $APP_PATH"
          
          # Extract the binary name from Info.plist
          BINARY_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" || echo "Velora")
          BINARY_PATH="$APP_PATH/$BINARY_NAME"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          PAYLOAD_APP="Payload/$(basename "$APP_PATH")"
          
          # Inject any missing essential Info.plist keys using PlistBuddy so we don't break the compiled bundle
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes: string audio" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes: string fetch" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes: string processing" "$PAYLOAD_APP/Info.plist" || true
          
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers array" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers: string com.velora.library.audit" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :BGTaskSchedulerPermittedIdentifiers: string com.velora.library.metadata" "$PAYLOAD_APP/Info.plist" || true
          
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PAYLOAD_APP/Info.plist" || true
          
          /usr/libexec/PlistBuddy -c "Add :NSLocalNetworkUsageDescription string 'Velora needs to connect to your Navidrome server on your local network.'" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices array" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices: string _http._tcp" "$PAYLOAD_APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :NSBonjourServices: string _subsonic._tcp" "$PAYLOAD_APP/Info.plist" || true
          
          # We don't manually copy raw PNG icons anymore; xcodebuild archive handles Assets.car perfectly!

          # Create the IPA
          zip -r Velora-Jailbreak.ipa Payload
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
