workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Debug Schemes
        script: xcodebuild -list

      - name: Build Unsigned App
        script: |
          xcodebuild build \
            -scheme Velora \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Build IPA
        script: |
          mkdir -p Payload
          # Find the .app in the custom build directory
          APP_PATH=$(find build -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Failed to find .app bundle"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # Create the Payload structure for the IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          
          # Zip it up into an .ipa
          zip -r Velora-Jailbreak.ipa Payload
          
          # Move to artifacts
          mkdir -p build/ios/ipa
          mv Velora-Jailbreak.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
