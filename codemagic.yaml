workflows:
  ios-jailbreak:
    name: Velora Jailbreak IPA (Unsigned)
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      vars:
        XCODE_SCHEME: "Velora"
      xcode: latest
    scripts:
      - name: Diagnostic Info
        script: |
          xcodebuild -version
          xcodebuild -list
          xcodebuild -scheme Velora -showBuildSettings -configuration Release -destination "generic/platform=iOS"
      - name: Build Unsigned App
        script: |
          xcodebuild archive \
            -scheme Velora \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath Velora.xcarchive \
            -derivedDataPath derived_data \
            -sdk iphoneos \
            ARCHS=arm64 \
            INSTALL_PATH=/Applications \
            PRODUCT_NAME=Velora \
            WRAPPER_EXTENSION=app \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO

      - name: Build IPA
        script: |
          # 1. Find the app bundle
          APP_PATH=$(find Velora.xcarchive -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "CRITICAL: Failed to find .app bundle."
            find Velora.xcarchive
            exit 1
          fi
          
          # 2. Find the binary
          BINARY_NAME="Velora"
          BINARY_PATH=$(find Velora.xcarchive/Products -type f -name "$BINARY_NAME" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find Velora.xcarchive/Products -type f -perm +111 -not -name "*.plist" -not -name "*.otf" | head -n 1)
          fi
          
          if [ -z "$BINARY_PATH" ]; then
            echo "CRITICAL: Failed to find binary."
            exit 1
          fi
          
          # 3. Assemble the bundle manually to be 100% sure
          echo "Assembling bundle at $APP_PATH"
          cp "$BINARY_PATH" "$APP_PATH/$BINARY_NAME"
          chmod +x "$APP_PATH/$BINARY_NAME"
          
          # 4. Force-write the Info.plist to ensure TrollStore compatibility
          cat <<EOF > "$APP_PATH/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>$BINARY_NAME</string>
              <key>CFBundleIdentifier</key>
              <string>com.velora.aistudio</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Velora</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>arm64</string>
              </array>
              <key>UIBackgroundModes</key>
              <array>
                  <string>audio</string>
              </array>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF
          
          echo "Final bundle contents:"
          ls -R "$APP_PATH"
          
          echo "Verifying Info.plist CFBundleExecutable:"
          grep -A 1 "CFBundleExecutable" "$APP_PATH/Info.plist"
          
          # 5. Create IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r Velora-Jailbreak.ipa Payload
          
          mkdir -p artifacts
          mv Velora-Jailbreak.ipa artifacts/
    artifacts:
      - artifacts/*.ipa
